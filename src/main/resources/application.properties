# ======================
# DATABASE
# ======================

spring.datasource.url=jdbc:postgresql://localhost:5432/notificationdb
spring.datasource.username=notification
spring.datasource.password=notification
spring.datasource.driver-class-name=org.postgresql.Driver

# timezone issue
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Kolkata';


# ======================
# JPA
# ======================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional (Spring Boot can auto detect)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092

# Consumer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.dinesh.notificationservice.infrastructure.messaging.event.NotificationEvent

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

#Retry Configuration
notification.retry.max-attempts=5
notification.retry.base-delay-ms=30000
notification.retry.poll-interval=10000


# Hikari Connection Pool
#max db pool size, recommended pool size = 2*(no. of cores)
spring.datasource.hikari.maximum-pool-size=20
# idle connection keep ready
spring.datasource.hikari.minimum-idle=5
#close unused connection
spring.datasource.hikari.idle-timeout=300000
#refresh connection
spring.datasource.hikari.max-lifetime=1800000
#wait time for connection timeout
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=NotificationHikariPool
